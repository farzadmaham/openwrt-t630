name: Build Custom OpenWrt 25.12.4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Build
      run: |
        sudo apt-get update && sudo apt-get install -y zstd
        curl -L -k "https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-imagebuilder-25.12.4-x86-64.Linux-x86_64.tar.zst" -o ib.tar.zst
        tar --use-compress-program=zstd -xf ib.tar.zst
        cd openwrt-imagebuilder-25.12.4-x86-64.Linux-x86_64
        make image PROFILE="generic" PACKAGES="dnsmasq-full" FILES="../files"
