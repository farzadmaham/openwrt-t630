name: Build Custom OpenWrt 24.10.7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Build
      run: |
        sudo apt-get update && sudo apt-get install -y zstd
        curl -L -k "https://downloads.openwrt.org/releases/24.10.7/targets/x86/64/openwrt-imagebuilder-24.10.7-x86-64.Linux-x86_64.tar.zst" -o ib.tar.zst
        tar --use-compress-program=zstd -xf ib.tar.zst
        cd openwrt-imagebuilder-24.10.7-x86-64.Linux-x86_64
        # در این نسخه نیازی به تنظیمات پیچیده نیست، مستقیم پکیج‌ها را می‌گیرد
        make image PROFILE="generic" PACKAGES="dnsmasq-full luci-app-passwall2 xray" FILES="../files"
